llm:
  endpoint: "http://localhost:8080/v1/chat/completions"
  model_name: "Qwen3.5-35B-A3B-APEX-Compact"
  timeout: 30
  max_tokens: 2048

# Embeddings configuration moved to config/embedding_config.yaml
# Please refer to that file for embedding-specific settings

retrieval:
  top_k: 5
  hybrid_search: true
  rerank: true
  chunk_size: 512
  chunk_overlap: 50

server:
  host: "0.0.0.0"
  port: 8000

directory_scanning:
  enabled: true
  watched_directories:
    - path: "./data/documents"
      recursive: true
    - path: "./data/knowledge-base"
      recursive: true
  allowed_extensions:
    - ".txt"
    - ".md"
    - ".json"
    - ".csv"
  scan:
    recursive: true
    debounce_ms: 500
    poll_interval_s: 60
  indexing:
    chunk_size: 512
    chunk_overlap: 50
  state:
    persistence_file: "./ai_workspace/memory/index_state.json"